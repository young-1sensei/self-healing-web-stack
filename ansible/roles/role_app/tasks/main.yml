---
- name: Create a simple index.html
  copy:
    content: |
      <!DOCTYPE html>
      <html>
      <head>
          <title>Self-Healing Web Stack</title>
          <style>
              body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
              .container { background: white; padding: 20px; border-radius: 8px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
          </style>
      </head>
      <body>
          <div class="container">
              <h1>Hello from the Self-Healing Stack!</h1>
              <p>Host: {{ ansible_hostname }}</p>
              <p>Private IP: {{ ansible_default_ipv4.address }}</p>
              <p>Managed by Ansible.</p>
          </div>
      </body>
      </html>
    dest: /usr/share/nginx/html/index.html
  become: yes
